<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes File Manager</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --success: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
    --sidebar-width: 220px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Login Screen */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-box {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .login-box h1 {
    font-size: 24px;
    margin-bottom: 8px;
    text-align: center;
  }

  .login-box p {
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 14px;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .password-wrapper input {
    padding-right: 40px;
  }

  .password-toggle {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .password-toggle:hover {
    opacity: 1;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }

  .btn-danger:hover {
    background: #ff6b63;
  }

  .btn-full { width: 100%; }

  .btn-sm {
    padding: 6px 10px;
    font-size: 12px;
  }

  .error-msg {
    background: rgba(248, 81, 73, 0.15);
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 16px;
    color: var(--danger);
    font-size: 14px;
    display: none;
  }

  .error-msg.show { display: block; }

  /* Main Layout: Sidebar + Content */
  .app-container {
    display: none;
    height: 100vh;
    overflow: hidden;
  }

  .app-container.active {
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .sidebar-nav {
    flex: 1;
    padding: 8px;
    overflow-y: auto;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 14px;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .nav-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: rgba(88, 166, 255, 0.15);
    color: var(--accent);
  }

  .nav-item .nav-icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .sidebar-footer .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* Main Content Area */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    min-height: 56px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h2 {
    font-size: 18px;
    font-weight: 600;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .storage-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .storage-selector select {
    padding: 6px 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .breadcrumb span {
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }

  .breadcrumb span:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .breadcrumb .sep { color: var(--text-secondary); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }

  .toolbar .btn {
    padding: 8px 12px;
    font-size: 13px;
  }

  .toolbar-spacer { flex: 1; }

  /* View Containers */
  .view-container {
    display: none;
    flex: 1;
    overflow: auto;
    padding: 20px;
  }

  .view-container.active {
    display: block;
  }

  /* File List */
  .file-list-container {
    width: 100%;
  }

  .file-list {
    width: 100%;
    border-collapse: collapse;
  }

  .file-list th,
  .file-list td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .file-list th {
    background: var(--bg-secondary);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-secondary);
    position: sticky;
    top: 0;
  }

  .file-list tr:hover td {
    background: var(--bg-tertiary);
  }

  .file-name {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .file-name:hover { color: var(--accent); }

  .file-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .file-icon.folder { color: var(--warning); }
  .file-icon.file { color: var(--text-secondary); }

  .file-size { color: var(--text-secondary); font-size: 13px; }

  .file-actions {
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  tr:hover .file-actions { opacity: 1; }

  .file-actions button {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
  }

  .file-actions button:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .file-actions button.danger:hover { color: var(--danger); }

  /* Empty State */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state.show { display: flex; }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow: auto;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h3 {
    font-size: 16px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-body {
    padding: 20px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  /* File Editor */
  .editor-textarea {
    width: 100%;
    min-height: 300px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 13px;
    padding: 12px;
    resize: vertical;
  }

  .editor-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Loading Spinner */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .loading-overlay.active { display: flex; }

  .loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .loading-content .spinner {
    width: 32px;
    height: 32px;
  }

  /* Toast Notifications */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 280px;
    animation: slideIn 0.3s ease;
  }

  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }
  .toast.warning { border-left: 3px solid var(--warning); }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .toast-title { font-weight: 600; margin-bottom: 4px; }
  .toast-msg { font-size: 13px; color: var(--text-secondary); }

  /* Teams / Pools Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .data-table th, .data-table td {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .data-table th {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
  }

  .data-table tr:last-child td {
    border-bottom: none;
  }

  .data-table tr:hover td {
    background: var(--bg-tertiary);
  }

  .data-table .actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  tr:hover .actions { opacity: 1; }

  .quota-bar {
    width: 120px;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
  }

  .quota-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .quota-fill.ok { background: var(--success); }
  .quota-fill.warn { background: var(--warning); }
  .quota-fill.danger { background: var(--danger); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge.active { background: rgba(63, 185, 80, 0.2); color: var(--success); }
  .badge.inactive { background: rgba(139, 148, 158, 0.2); color: var(--text-secondary); }
  .badge.owner { background: rgba(88, 166, 255, 0.2); color: var(--accent); }
  .badge.member { background: rgba(139, 148, 158, 0.2); color: var(--text-secondary); }

  .view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .view-header h3 {
    font-size: 16px;
    color: var(--text-secondary);
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-secondary);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .file-list th:nth-child(3),
    .file-list td:nth-child(3) { display: none; }
    .header h2 { font-size: 16px; }
  }

  /* Knowledge View */
  .knowledge-container {
    padding: 24px;
    max-width: 800px;
  }

  .knowledge-section {
    margin-bottom: 32px;
  }

  .knowledge-section .section-title {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .knowledge-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .knowledge-status {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-label {
    color: var(--text-secondary);
    font-size: 13px;
    min-width: 100px;
  }

  .status-value {
    color: var(--text-primary);
    font-weight: 500;
  }

  .status-value.running { color: var(--success); }
  .status-value.stopped { color: var(--danger); }
  .status-value.checking { color: var(--warning); }

  .sync-mode {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
  }

  .sync-mode-option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    background: var(--bg-tertiary);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .sync-mode-option:hover {
    background: var(--bg-primary);
  }

  .sync-mode-option input {
    margin-top: 2px;
  }

  .sync-mode-option .mode-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .search-result-item {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .search-result-item:last-child {
    border-bottom: none;
  }

  .search-result-title {
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .search-result-snippet {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Space View */
  .space-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .space-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .space-card:hover { border-color: var(--accent); }
  .space-card.selected { border-color: var(--accent); background: var(--bg-tertiary); }

  .space-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .space-card-name { font-size: 15px; font-weight: 600; }
  .space-card-type {
    font-size: 11px; padding: 2px 8px; border-radius: 12px;
    background: var(--bg-tertiary); color: var(--text-secondary);
  }
  .space-card-type.team { background: #1f4b6e; color: #79c0ff; }
  .space-card-type.private { background: #3d2a1a; color: #ffa657; }
  .space-card-type.root { background: #2d2040; color: #d2a8ff; }

  .space-card-meta {
    font-size: 12px; color: var(--text-secondary);
    display: flex; flex-direction: column; gap: 4px; margin-top: 8px;
  }
  .space-card-meta span { display: flex; align-items: center; gap: 4px; }

  .space-card-quota { margin-top: 10px; }
  .quota-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .quota-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .quota-fill.ok { background: var(--success); }
  .quota-fill.warn { background: var(--warning); }
  .quota-fill.danger { background: var(--danger); }
  .quota-stat { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  /* Tabs */
  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; }
  .tab-btn {
    padding: 6px 16px; border-radius: 6px; border: none; background: transparent;
    color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* Member list */
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-item {
    display: flex; align-items: center; padding: 10px 12px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 6px; gap: 12px;
  }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 500; }
  .member-role { font-size: 12px; color: var(--text-secondary); }
  .member-actions { display: flex; gap: 8px; }

  /* Activity */
  .activity-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .activity-item { padding: 8px 12px; background: var(--bg-primary); border-radius: 6px; font-size: 13px; }
  .activity-item .action { font-weight: 500; color: var(--accent); }
  .activity-item .time { font-size: 11px; color: var(--text-secondary); float: right; }
  .activity-item .path { font-family: monospace; font-size: 12px; color: var(--text-secondary); }
  .activity-item .extra { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .code-block { background: var(--bg-primary); padding: 10px 12px; border-radius: 6px; font-family: monospace; font-size: 13px; color: var(--text-primary); white-space: pre-wrap; word-break: break-all; margin: 8px 0; }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    <h1>Hermes 文件管理器</h1>
    <p>登录以访问您的文件</p>
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <div class="password-wrapper">
          <input type="password" id="password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1">👁</button>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <input type="checkbox" id="rememberMe" style="width:auto">
        <label for="rememberMe" style="margin:0;font-size:13px;color:var(--text-secondary)">记住账号密码</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">登录</button>
    </form>

<script>
const API_BASE = 'http://localhost:8080/api/v1';
const TOKEN_KEY = 'hfm_token';

// State
let currentPath = '/';
let currentView = 'files';
let token = localStorage.getItem(TOKEN_KEY) || null;
let currentUserData = null;
let myTeams = [];
let myStorageContexts = [];

// DOM Elements
const loginScreen = document.getElementById('loginScreen');
const appContainer = document.getElementById('appContainer');
const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const breadcrumb = document.getElementById('breadcrumb');
const fileListBody = document.getElementById('fileListBody');
const emptyState = document.getElementById('emptyState');
const currentUser = document.getElementById('currentUser');
const loadingOverlay = document.getElementById('loadingOverlay');
const toastContainer = document.getElementById('toastContainer');
const modalOverlay = document.getElementById('modalOverlay');

// Utility Functions
function showLoading() { loadingOverlay.classList.add('active'); }
function hideLoading() { loadingOverlay.classList.remove('active'); }

function toast(type, title, msg) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<div class="toast-title">${title}</div><div class="toast-msg">${msg}</div>`;
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function formatSize(bytes) {
  if (bytes === 0 || bytes === undefined || bytes === null) return '-';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
  return `${bytes.toFixed(1)} ${units[i]}`;
}

function formatDate(str) {
  if (!str) return '-';
  const d = new Date(str);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function api(endpoint, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API_BASE + endpoint, { ...options, headers });
  const contentType = res.headers.get('content-type') || '';
  let data;
  if (contentType.includes('application/json')) {
    data = await res.json();
  } else {
    const text = await res.text();
    throw new Error(text || `HTTP ${res.status}`);
  }
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// Modal Functions
function openModal(title, bodyHTML, footerHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalFooter').innerHTML = footerHTML;
  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// Navigation
function navigateTo(view) {
  currentView = view;

  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  // Update views
  document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
  const viewEl = document.getElementById('view-' + view);
  if (viewEl) viewEl.classList.add('active');

  // Update toolbar
  document.getElementById('fileToolbar').style.display = view === 'files' ? '' : 'none';
  document.getElementById('teamToolbar').style.display = view === 'teams' ? '' : 'none';
  document.getElementById('poolToolbar').style.display = view === 'pools' ? '' : 'none';
  document.getElementById('knowledgeToolbar').style.display = view === 'knowledge' ? '' : 'none';

  // Update header title
  const titles = { files: '文件', teams: '团队管理', pools: '存储池管理', knowledge: '知识管理', spaces: '空间管理' };
  document.getElementById('viewTitle').textContent = titles[view] || view;

  // Hide breadcrumb for non-files views
  breadcrumb.style.display = view === 'files' ? '' : 'none';

  // Load data for view
  if (view === 'teams') loadTeams();
  if (view === 'pools') loadPools();
  if (view === 'knowledge') loadKnowledgeView();
  if (view === 'spaces') loadSpaces();
}

// Auth
let showingRegister = false;

function showLoginScreen() {
  loginScreen.style.display = 'flex';
  registerScreen.style.display = 'none';
  showingRegister = false;
  loadSavedCredentials();
}

function loadSavedCredentials() {
  if (localStorage.getItem('hfm_remember') === 'true') {
    document.getElementById('username').value = localStorage.getItem('hfm_username') || '';
    document.getElementById('password').value = localStorage.getItem('hfm_password') || '';
    document.getElementById('rememberMe').checked = true;
  } else {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('rememberMe').checked = false;
  }
}

function showRegisterScreen() {
  loginScreen.style.display = 'none';
  registerScreen.style.display = 'flex';
  showingRegister = true;
}

document.getElementById('showRegister').addEventListener('click', (e) => {
  e.preventDefault();
  showRegisterScreen();
});

document.getElementById('showLogin').addEventListener('click', (e) => {
  e.preventDefault();
  showLoginScreen();
});

function checkAuth() {
  if (token) {
    appContainer.classList.add('active');
    loadCurrentUser();
    loadFiles(currentPath);
  } else {
    showLoginScreen();
    appContainer.classList.remove('active');
  }
}

// Auto-login with remembered credentials on page load
(async function() {
  const savedToken = localStorage.getItem(TOKEN_KEY);
  if (savedToken) {
    // Verify token is still valid
    try {
      const res = await fetch(API_BASE + '/auth/me', {
        headers: { 'Authorization': `Bearer ${savedToken}` }
      });
      if (res.ok) {
        const data = await res.json();
        token = savedToken;
        loginScreen.style.display = 'none';
        appContainer.classList.add('active');
        currentUser.textContent = data.username;
        document.getElementById('sidebarUsername').textContent = data.username;
        loadStorageContexts();
        loadFiles(currentPath);
        return;
      }
    } catch (e) {}
  }

  // Token invalid or not found, check remember me
  if (localStorage.getItem('hfm_remember') === 'true') {
    const username = localStorage.getItem('hfm_username');
    const password = localStorage.getItem('hfm_password');
    if (username && password) {
      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.access_token) {
          token = data.access_token;
          localStorage.setItem(TOKEN_KEY, token);
          loginScreen.style.display = 'none';
          appContainer.classList.add('active');
          loadCurrentUser();
          loadFiles(currentPath);
          return;
        }
      } catch (e) {}
    }
  }

  // Show login screen with saved credentials
  loadSavedCredentials();
  checkAuth();
})();

async function loadCurrentUser() {
  try {
    const res = await api('/auth/me');
    currentUserData = res;
    currentUser.textContent = res.username;
    document.getElementById('sidebarUsername').textContent = res.username;
    // Load storage contexts
    await loadStorageContexts();
  } catch (e) {
    logout();
  }
}

async function loadStorageContexts() {
  try {
    const ctxs = await api('/my/storage-context');
    myStorageContexts = ctxs.contexts || [];
    renderSpaceSelector();
  } catch (e) {
    myStorageContexts = [];
  }
}

function renderSpaceSelector() {
  const sel = document.getElementById('spaceSelect');
  const wrapper = document.getElementById('storageSelector');
  if (!myStorageContexts || myStorageContexts.length === 0) {
    wrapper.style.display = 'none';
    return;
  }
  wrapper.style.display = '';
  sel.innerHTML = '<option value="">-- 选择空间 --</option>' +
    myStorageContexts.map(c =>
      `<option value="${c.space_id}">${escHtml(c.space_name || c.space_id)}</option>`
    ).join('');
}

function onSpaceChange(spaceId) {
  if (!spaceId) return;
  const ctx = myStorageContexts.find(c => c.space_id === spaceId);
  if (ctx) {
    navigateTo('files');
    loadFiles(currentPath);
  }
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const rememberMe = document.getElementById('rememberMe').checked;
  loginError.classList.remove('show');

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登录失败');

    token = data.access_token;
    localStorage.setItem(TOKEN_KEY, token);
    if (rememberMe) {
      localStorage.setItem('hfm_remember', 'true');
      localStorage.setItem('hfm_username', username);
      localStorage.setItem('hfm_password', password);
    } else {
      localStorage.removeItem('hfm_remember');
      localStorage.removeItem('hfm_username');
      localStorage.removeItem('hfm_password');
    }
    loginError.classList.remove('show');
    loginScreen.style.display = 'none';
    checkAuth();
    toast('success', '欢迎', `已登录：${username}`);
  } catch (err) {
    loginError.textContent = err.message;
    loginError.classList.add('show');
  }
});

// Register form
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  const registerError = document.getElementById('registerError');
  registerError.classList.remove('show');

  if (!username || !password) {
    registerError.textContent = '请填写所有字段';
    registerError.classList.add('show');
    return;
  }

  if (username.length < 3) {
    registerError.textContent = '用户名至少需要3个字符';
    registerError.classList.add('show');
    return;
  }

  if (password.length < 6) {
    registerError.textContent = '密码至少需要6个字符';
    registerError.classList.add('show');
    return;
  }

  if (password !== password2) {
    registerError.textContent = '两次密码输入不一致';
    registerError.classList.add('show');
    return;
  }

  try {
    const res = await fetch(API_BASE + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '注册失败');

    // Auto-login after register
    const loginRes = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const loginData = await loginRes.json();
    if (!loginRes.ok) throw new Error(loginData.detail || '注册后自动登录失败');

    token = loginData.access_token;
    localStorage.setItem(TOKEN_KEY, token);
    registerError.classList.remove('show');
    loginScreen.style.display = 'none';
    checkAuth();
    toast('success', '欢迎！', `账户已创建并登录：${username}`);
  } catch (err) {
    registerError.textContent = err.message;
    registerError.classList.add('show');
  }
});

// File upload handler
async function handleFileUpload(files) {
  if (!files.length) return;
  showLoading();
  try {
    for (const file of files) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('path', currentPath);
      const res = await fetch(API_BASE + '/files/upload', {
        method: 'POST',
        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        body: formData
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || `上传失败: ${file.name}`);
      }
    }
    toast('success', '上传成功', `${files.length} 个文件已上传`);
    loadFiles(currentPath);
  } catch (err) {
    toast('error', '上传错误', err.message);
  } finally {
    hideLoading();
    document.getElementById('fileInput').value = '';
  }
}

          <button onclick="shareItem('${escapeHtml(f.path)}')">分享</button>

        currentPath = el.dataset.path;
        loadFiles(currentPath);

function openInFinder(path) {
  if (window.__TAURI__) {
    tauri.invoke('open_path_in_finder', { path }).catch(e => {
      toast('error', '错误', '无法打开文件夹: ' + e);
    });
  } else {
    // Fallback: get storage root and construct full path
    api('/storage/info').then(r => r.json()).then(data => {
      const storageRoot = data.storage_root || '';
      const fullPath = path === '/' ? storageRoot : storageRoot + '/' + path;
      window.open(`file://${fullPath}`, '_blank');
    }).catch(() => {
      toast('error', '错误', '无法定位文件位置');
    });
  }
}

// File Operations
// Common file types that should open in system default viewer
const SYSTEM_OPEN_TYPES = [
  'pdf', 'png', 'jpg', 'jpeg', 'gif', 'bmp', 'ico', 'tiff', 'webp',
  'mp4', 'mov', 'avi', 'mp3', 'wav', 'aac', 'flac',
  'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx',
  'zip', 'tar', 'gz', 'rar', '7z',
  'svg', 'psd', 'ai', 'eps'
];

function isSystemOpenType(path) {
  const ext = path.split('.').pop().toLowerCase();
  return SYSTEM_OPEN_TYPES.includes(ext);
}

async function viewFile(path) {
  const name = path.split('/').pop();

  // For common file types, reveal in Finder (don't download content)
  if (isSystemOpenType(path)) {
    openInFinder(path);
    return;
  }

  // For text-based files, show in modal editor
  showLoading();
  try {
    const data = await api('/files/read', {
      method: 'POST',
      body: JSON.stringify({ path })
    });
    openModal(
      escapeHtml(name),
      `<textarea class="editor-textarea" readonly id="viewContent">${escapeHtml(data.content || '')}</textarea>`,
      `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>
       <button class="btn btn-primary" onclick="editFile('${escapeHtml(path)}')">编辑</button>`
    );
  } catch (err) {
    toast('error', '错误', err.message);
  } finally {
    hideLoading();
  }
}

function renderPools(pools, teams) {

    <thead><tr>
      <th>名称</th>
      <th>协议</th>
      <th>路径 / URI</th>
      <th>容量</th>
      <th>剩余</th>
      <th>团队占用</th>
      <th>状态</th>
      <th></th>
    </tr></thead>
    <tbody>
      ${pools.map(p => {
        const usedByTeams = teams.filter(t => t.storage_pool_id === p.id);
        const pct = p.total_bytes > 0 ? Math.min(100, Math.round((p.total_bytes - p.free_bytes) / p.total_bytes * 100)) : 0;
        const cls = pct > 90 ? 'danger' : pct > 70 ? 'warn' : 'ok';
        return `<tr>
          <td><strong>${escapeHtml(p.name)}</strong></td>
          <td><span class="badge">${p.protocol}</span></td>
          <td><code style="font-size:11px;color:var(--text-secondary)">${escapeHtml(p.base_path)}</code></td>

          <td>${p.free_bytes > 0 ? formatSize(p.free_bytes) : '-'}</td>
          <td>${usedByTeams.length} 个团队</td>

          <td>
            <div class="actions">
              ${usedByTeams.length === 0 ? `<button class="btn btn-danger btn-sm" onclick="deletePool('${p.id}')">删除</button>` : ''}
              <button class="btn btn-secondary btn-sm" onclick="refreshPool('${p.id}')">刷新容量</button>
            </div>
          </td>
        </tr>`;
      }).join('')}

  </table>`;
}

  const settings = {
    mode,
    interval_minutes: interval,
    webhook_enabled: mode.startsWith('webhook'),
    auto_sync: mode === 'webhook_sync'
  };

  try {
    await api('/sync/settings', {
      method: 'POST',
      body: JSON.stringify(settings)

function openLlmWiki() {
  // Launch llm_wiki desktop app via Tauri
  if (window.__TAURI__) {
    toast('info', '启动中', '正在打开知识库...');
    tauri.invoke('open_llm_wiki').then(() => {

      setTimeout(() => {
        fetch('http://localhost:19827/health').then(r => {
          if (r.ok) toast('success', '已启动', '知识库 FM 已打开');
        }).catch(() => {
          // GUI may take longer to start, try serve URL as fallback
          fetch('http://localhost:1421/health').then(r => {
            if (r.ok) toast('success', '已启动', '知识库 FM 已打开');
          }).catch(() => {});

async function syncToLlmWiki() {
  const sourcePath = document.getElementById('syncSourcePath')?.value?.trim();
  const project = document.getElementById('syncProject')?.value || 'default';

  if (!sourcePath) {
    toast('warning', '提示', '请输入要同步的文件路径');
    return;
  }

  showLoading();
  try {
    // Check if llm_wiki is running
    const statusRes = await fetch(`${LLM_WIKI_API}/health`, { method: 'GET' });
    if (!statusRes.ok) {
      throw new Error('llm_wiki 服务未运行，请先启动 llm_wiki');
    }

    // Trigger sync via API
    const res = await fetch(`${LLM_WIKI_API}/api/wiki/${project}/ingest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_path: sourcePath, project_name: project })
    });

    if (res.ok) {
      const data = await res.json();
      toast('success', '已同步', `已提交同步任务: ${data.message}`);
    } else {
      throw new Error('同步请求失败');
    }
  } catch (e) {
    toast('error', '同步失败', e.message);
  } finally {
    hideLoading();
  }
}

async function searchKnowledge() {
  const query = document.getElementById('knowledgeSearchQuery')?.value?.trim();
  const project = document.getElementById('syncProject')?.value || 'default';

  if (!query) {
    toast('warning', '提示', '请输入搜索关键词');
    return;
  }

  showLoading();
  try {
    const res = await fetch(`${LLM_WIKI_API}/api/wiki/${project}/search?q=${encodeURIComponent(query)}`, {
      method: 'GET'
    });

    if (!res.ok) {
      throw new Error('搜索请求失败');
    }

    const data = await res.json();
    const resultsEl = document.getElementById('knowledgeSearchResults');

    if (!data || data.length === 0) {
      resultsEl.innerHTML = '<p style="color:var(--text-secondary)">未找到相关结果</p>';
    } else {
      resultsEl.innerHTML = data.map(r => `
        <div class="search-result-item">
          <div class="search-result-title">${escapeHtml(r.title || 'Untitled')}</div>
          <div class="search-result-snippet">${escapeHtml(r.content?.substring(0, 200) || '')}...</div>
        </div>
      `).join('');
    }
  } catch (e) {
    toast('error', '搜索失败', e.message);
  } finally {
    hideLoading();
  }
}

let currentSpaceId = null;

async function loadSpaces() {
  try {
    showLoading();
    const data = await api('/spaces');
    renderSpacesList(data.spaces || []);
  } catch (e) {
    toast('error', '加载失败', e.message);

function renderSpacesList(spaces) {
  const container = document.getElementById('spacesList');
  if (!spaces || spaces.length === 0) {
    container.innerHTML = '<p style="color:var(--text-secondary);padding:20px">暂无空间，请先创建空间。</p>';
    return;
  }
  const html = `<div class="space-grid">${spaces.map(s => spaceCardHTML(s)).join('')}</div>`;
  container.innerHTML = html;
}

function spaceCardHTML(space) {
  const used = space.used_bytes || 0;
  const max = space.max_bytes || 0;
  const pct = max > 0 ? Math.min(100, (used / max) * 100) : 0;
  const cls = pct >= 90 ? 'danger' : pct >= 80 ? 'warn' : 'ok';
  const typeLabel = { root: '根空间', team: '团队', private: '私有' };
  const typeClass = space.space_type || 'team';
  const usedGB = used > 0 ? (used / 1024 / 1024 / 1024).toFixed(1) + ' GB' : '-';
  const maxGB = max > 0 ? (max / 1024 / 1024 / 1024).toFixed(1) + ' GB' : '无限制';

  return `<div class="space-card ${currentSpaceId === space.id ? 'selected' : ''}" onclick="selectSpace('${space.id}', this)">
    <div class="space-card-header">
      <span class="space-card-name">${escHtml(space.name)}</span>
      <span class="space-card-type ${typeClass}">${typeLabel[typeClass] || typeClass}</span>
    </div>
    <div class="space-card-meta">
      <span>👤 ${escHtml(space.owner_name || space.owner_id)}</span>
      <span>📁 ${space.member_count || 0} 成员</span>
    </div>
    ${max > 0 ? `<div class="space-card-quota">
      <div class="quota-bar"><div class="quota-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="quota-stat"><span>${usedGB} / ${maxGB}</span><span>${pct.toFixed(0)}%</span></div>
    </div>` : '<div style="margin-top:8px;color:var(--text-secondary);font-size:12px">无配额限制</div>'}
  </div>`;
}

async function selectSpace(spaceId, cardEl) {
  currentSpaceId = spaceId;
  // Refresh card selection
  document.querySelectorAll('.space-card').forEach(c => c.classList.remove('selected'));
  if (cardEl) cardEl.classList.add('selected');
  else document.querySelector(`.space-card[onclick*="${spaceId}"]`)?.classList.add('selected');
  // Load detail
  try {
    const space = await api(`/spaces/${spaceId}`);
    showSpaceDetail(space);
  } catch (e) {
    toast('error', '加载失败', e.message);
  }
}

function showSpaceDetail(space) {
  const detail = document.getElementById('spaceDetail');
  detail.style.display = 'block';
  document.getElementById('spaceDetailTitle').textContent = space.name;
  // Reset tabs
  switchSpaceTab('members');
  // Load members
  loadSpaceMembers(space.id);
}

async function loadSpaceMembers(spaceId) {
  try {
    const data = await api(`/spaces/${spaceId}/members`);
    renderSpaceMembers(data.members || []);
  } catch (e) {
    document.getElementById('spaceMembersList').innerHTML = '<p style="color:var(--danger)">加载成员失败</p>';
  }
}

function renderSpaceMembers(members) {
  const container = document.getElementById('spaceMembersList');
  if (!members.length) {
    container.innerHTML = '<p style="color:var(--text-secondary)">暂无成员</p>';
    return;
  }
  container.innerHTML = `<div class="member-list">${members.map(m => `
    <div class="member-item">
      <div class="member-info">
        <div class="member-name">${escHtml(m.username || m.user_id)}</div>
        <div class="member-role">${m.role === 'owner' ? '所有者' : m.role === 'viewer' ? '只读' : '成员'}</div>
      </div>
      <div class="member-actions">
        ${m.role !== 'owner' ? `<button class="btn btn-danger btn-sm" onclick="removeSpaceMember('${m.space_id}', '${m.user_id}')">移除</button>` : ''}
      </div>
    </div>
  `).join('')}</div>`;
}

function switchSpaceTab(tab) {
  // Hide all tab contents
  ['members', 'workflows', 'notebooks', 'settings'].forEach(t => {
    document.getElementById(`space-tab-${t}`).style.display = 'none';
  });
  // Show selected
  document.getElementById(`space-tab-${tab}`).style.display = 'block';
  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchSpaceTab('${tab}')"]`)?.classList.add('active');
  // Load tab content
  if (tab === 'workflows' && currentSpaceId) loadSpaceWorkflows(currentSpaceId);
  if (tab === 'notebooks' && currentSpaceId) loadSpaceNotebooks(currentSpaceId);
  if (tab === 'settings') loadSpaceSettings(currentSpaceId);
}

async function loadSpaceWorkflows(spaceId) {
  const container = document.getElementById('spaceWorkflowsList');
  try {
    const data = await api(`/spaces/${spaceId}/workflows`);
    if (!data.workflows || data.workflows.length === 0) {
      container.innerHTML = '<p style="color:var(--text-secondary)">暂无工作流</p>';

let currentTagFilter = '';
let currentSearchText = '';

function filterNotebooks() {
  const search = document.getElementById('nbSearch').value.toLowerCase();
  currentSearchText = search;
  applyNotebookFilters();
}

function filterByTag(tag) {
  currentTagFilter = currentTagFilter === tag ? '' : tag;
  applyNotebookFilters();
}

function clearTagFilter() {
  currentTagFilter = '';
  applyNotebookFilters();
}

function applyNotebookFilters() {
  const items = document.querySelectorAll('#notebooksList .member-item');
  items.forEach(item => {
    const name = item.getAttribute('data-name') || '';
    const tags = item.getAttribute('data-tags') || '';
    const matchSearch = !currentSearchText || name.includes(currentSearchText);
    const matchTag = !currentTagFilter || tags.split(',').includes(currentTagFilter);
    item.style.display = (matchSearch && matchTag) ? '' : 'none';
  });
}

function renderMarkdown(text) {
  if (!text) return '<p style="color:var(--text-secondary)">暂无内容</p>';
  // Simple markdown renderer
  let html = escHtml(text);
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, '<pre style="background:var(--bg-primary);padding:12px;border-radius:4px;overflow-x:auto"><code>$1</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg-primary);padding:2px 6px;border-radius:3px">$1</code>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  // Clean up extra br inside pre/code
  html = html.replace(/<pre[^>]*><code([^>]*)>(.*?)<\/code><\/pre>/gs, (m, a, c) => {
    return `<pre style="background:var(--bg-primary);padding:12px;border-radius:4px;overflow-x:auto"><code${a}>${c.replace(/<br>/g, '\n')}</code></pre>`;
  });
  return html;
}

  api(`/notebooks/${notebookId}`).then(nb => {

    const vars = nb.variables || [];
    vars.forEach(v => {

      if (input && input.value) {

      </div>
      <div class="form-group">
        <label>内容（Markdown）</label>
        <textarea id="nb_content" rows="12" style="width:100%;padding:10px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:monospace">${escHtml(nb.content || '')}</textarea>
      </div>
      <div style="margin-top:8px">
        <label style="font-size:13px;color:var(--text-secondary)">
          <input type="checkbox" id="nb_shared" ${nb.is_shared ? 'checked' : ''}> 团队共享
        </label>
      </div>
      <div id="nbVarsSection" style="margin-top:16px;padding:12px;background:var(--bg-tertiary);border-radius:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h5 style="color:var(--warning);margin:0">📝 变量</h5>
          <button class="btn btn-secondary btn-sm" onclick="addNotebookVar('${nb.id}')">+ 添加变量</button>
        </div>
        <div id="nbVarsList">
          ${(nb.variables || []).map(v => `
            <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
              <input type="text" value="${escHtml(v.name)}" placeholder="$VAR_NAME"
                id="nb_var_name_${v.id}" style="width:120px;padding:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
              <input type="text" value="${escHtml(v.default_value || '')}" placeholder="默认值"
                id="nb_var_val_${v.id}" style="flex:1;padding:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
              <input type="text" value="${escHtml(v.description || '')}" placeholder="说明"
                id="nb_var_desc_${v.id}" style="flex:1;padding:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
              <button class="btn btn-danger btn-sm" onclick="removeNotebookVar('${nb.id}', '${v.id}')">×</button>
            </div>
          `).join('')}
          ${(nb.variables || []).length === 0 ? '<p style="color:var(--text-secondary);font-size:13px">暂无变量</p>' : ''}
        </div>
      </div>
    `;
    document.getElementById('modalFooter').innerHTML = `
      <button class="btn" onclick="saveEditNotebook('${nb.id}')">保存</button>
      <button class="btn btn-secondary" onclick="viewNotebook('${nb.id}')">取消</button>
    `;
    modal.classList.add('active');
  } catch (e) {
    toast('error', '加载失败', e.message);
  }
}

async function saveEditNotebook(notebookId) {
  const name = document.getElementById('nb_name').value.trim();
  const description = document.getElementById('nb_desc').value.trim();
  const content = document.getElementById('nb_content').value;
  const is_shared = document.getElementById('nb_shared').checked;

  if (!name) {
    toast('error', '请填写', '笔记本名称不能为空');
    return;
  }

  try {
    await api(`/notebooks/${notebookId}`, {
      method: 'PATCH',
      body: JSON.stringify({ name, description, content, is_shared })
    });
    toast('success', '已保存', '笔记本已更新');
    viewNotebook(notebookId);
  } catch (e) {
    toast('error', '保存失败', e.message);
  }
}

async function deleteNotebook(notebookId) {
  if (!confirm('确定要删除这个笔记本吗？此操作不可恢复。')) return;
  try {
    await api(`/notebooks/${notebookId}`, { method: 'DELETE' });
    toast('success', '已删除', '笔记本已删除');
    closeModal();
    if (currentSpaceId) loadSpaceNotebooks(currentSpaceId);
  } catch (e) {
    toast('error', '删除失败', e.message);
  }
}

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
