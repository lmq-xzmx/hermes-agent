<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, height=480">
    <title>快捷上传</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1f26;
            color: #e6edf3;
            overflow: hidden;
        }
        /* 主容器 */
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 12px;
        }
        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: rgba(56,139,253,0.1);
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            flex-shrink: 0;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
        .status-dot.ok { background: #3fb950; }
        .status-dot.err { background: #f85149; }

        /* 拖放区 */
        .drop-zone {
            flex: 1;
            min-height: 120px;
            border: 2px dashed #30363d;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .drop-zone.drag-over { border-color: #58a6ff; background: rgba(56,139,253,0.08); }
        .drop-icon { font-size: 36px; margin-bottom: 8px; }
        .drop-text { font-size: 13px; color: #8b949e; }
        .drop-target { font-size: 11px; color: #58a6ff; margin-top: 8px; max-width: 90%; word-break: break-all; text-align: center; }

        /* 路径设置 */
        .path-section {
            flex-shrink: 0;
        }
        .path-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
        .path-row { display: flex; gap: 8px; }
        .path-input {
            flex: 1;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 12px;
        }
        .path-input:focus { outline: none; border-color: #58a6ff; }
        .btn {
            padding: 10px 16px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:hover { background: #2ea043; }

        /* 路径提示 */
        .path-hint {
            font-size: 10px;
            color: #6e7681;
            margin-top: 6px;
        }
        .path-hint code {
            background: #0d1117;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
            color: #8b949e;
        }

        /* 底部工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-shrink: 0;
        }
        .toolbar .btn {
            flex: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #e6edf3; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #238636;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #da3633; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 状态 -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">检查连接...</span>
        </div>

        <!-- 拖放区 -->
        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📤</div>
            <div class="drop-text">拖拽文件到此处上传</div>
            <div class="drop-target" id="targetDisplay">未设置目标路径</div>
        </div>

        <!-- 路径设置 -->
        <div class="path-section">
            <div class="path-label">目标路径</div>
            <div class="path-row">
                <select class="path-input" id="pathInput" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;">
                    <option value="">请选择已分配空间</option>
                </select>
                <button class="btn" id="saveBtn">保存</button>
            </div>
            <div class="path-hint">
                格式: <code>spaces/{空间ID}/shared/{文件夹}</code>
            </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="toolbar">
            <button class="btn btn-secondary" id="openBtn">📁 打开主界面</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const invoke = window.__TAURI__ ? window.__TAURI__.core.invoke.bind(window.__TAURI__.core) : null;
        const API_BASE = 'http://localhost:8080/api/v1';

        let savedPath = localStorage.getItem('floating_upload_path') || '';
        let token = localStorage.getItem('hfm_token') || '';
        let spaces = [];

        async function api(path, opts = {}) {
            const res = await fetch(API_BASE + path, {
                ...opts,
                headers: { 'Authorization': 'Bearer ' + token, ...opts.headers }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: res.statusText }));
                throw new Error(err.detail || '请求失败');
            }
            return res.json();
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '') + ' show';
            setTimeout(() => t.className = 'toast', 2500);
        }

        function updateStatus(ok, text) {
            document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'err');
            document.getElementById('statusText').textContent = text;
        }

        async function init() {
            console.log('[Floating] init, __TAURI__:', window.__TAURI__);
            try {
                const res = await fetch('http://localhost:8080/health');
                if (res.ok) {
                    updateStatus(true, '已连接 Hermes');
                } else {
                    updateStatus(false, 'API 连接异常');
                }
            } catch (e) {
                updateStatus(false, 'API 未运行');
            }
            token = localStorage.getItem('hfm_token') || '';
            await loadSpaces();
            updateTargetDisplay();
        }

        async function loadSpaces() {
            const select = document.getElementById('pathInput');
            select.innerHTML = '<option value="">加载中...</option>';
            try {
                const data = await api('/spaces');
                spaces = data.spaces || [];
                select.innerHTML = '<option value="">请选择已分配空间</option>';
                spaces.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = `spaces/${s.id}`;
                    opt.textContent = s.name || s.id;
                    select.appendChild(opt);
                });
                if (savedPath) select.value = savedPath;
            } catch (e) {
                select.innerHTML = '<option value="">加载失败</option>';
                console.error('Failed to load spaces:', e);
            }
        }

        function updateTargetDisplay() {
            const p = savedPath || '(未设置)';
            document.getElementById('targetDisplay').textContent = '目标: ' + p;
        }

        document.getElementById('saveBtn').onclick = () => {
            const path = document.getElementById('pathInput').value;
            savedPath = path;
            localStorage.setItem('floating_upload_path', path);
            updateTargetDisplay();
            showToast('路径已保存');
        };

        document.getElementById('openBtn').onclick = () => {
            console.log('[Floating] openBtn clicked, invoke:', invoke);
            console.log('[Floating] __TAURI__:', window.__TAURI__);
            if (invoke) {
                invoke('show_main_window').then(r => console.log('[Floating] show_main result:', r)).catch(e => console.error('[Floating] error:', e));
            } else {
                showToast('invoke 不可用', true);
            }
        };

        const dropZone = document.getElementById('dropZone');
        ['dragenter','dragover','dragleave','drop'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
        });
        ['dragenter','dragover'].forEach(e => { dropZone.addEventListener(e, () => dropZone.classList.add('drag-over')); });
        ['dragleave','drop'].forEach(e => { dropZone.addEventListener(e, () => dropZone.classList.remove('drag-over')); });

        dropZone.addEventListener('drop', async e => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            if (!files.length) return;
            if (!savedPath) { showToast('请先设置并保存目标路径', true); return; }
            if (!token) { showToast('请先在主界面登录', true); return; }
            for (const file of files) {
                await uploadFile(file);
            }
        });

        async function uploadFile(file) {
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('path', savedPath);
                const res = await fetch(API_BASE + '/files/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                if (res.ok) {
                    showToast('已上传: ' + file.name);
                } else {
                    const err = await res.json().catch(() => ({ detail: '上传失败' }));
                    showToast('失败: ' + (err.detail || file.name), true);
                }
            } catch (e) {
                showToast('上传失败: ' + e.message, true);
            }
        }

        init();
    </script>
</body>
</html>
